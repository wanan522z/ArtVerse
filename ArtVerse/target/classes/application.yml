server:
  port: 8000

spring:
  datasource:
    # 三重保险：
    #   1. options=-c client_encoding=UTF8 → 建链时直接发 SET 命令
    #   2. charSet=UTF-8 → 通知驱动按 UTF-8 解读字节
    #   3. JVM file.encoding=UTF-8（由启动脚本 start-backend.ps1 设置）
    # 原因：PostgreSQL JDBC 42.7.x 在 Windows 上默认按 JVM 默认编码（GBK/CP1252）
    #      解读字节，导致双重 UTF-8 编码的中文以 Latin-1 形式读出。
    url: jdbc:postgresql://localhost:5432/manga_novel?ApplicationName=artverse&stringtype=unspecified&options=-c%20client_encoding%3DUTF8&charSet=UTF-8
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    property-naming-strategy: SNAKE_CASE
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 5000

artverse:
  cors-origins:
    - http://localhost:5173
    - http://127.0.0.1:5173
  storage:
    root: ./manga_outputs
  upload:
    max-image-bytes: 10485760
  import:
    max-zip-bytes: 524288000
    max-novel-chars: 50000
  character:
    max-chars: 20000
  ref:
    max-images-per-level: 4
  manga:
    default-image-count: 10
    allowed-image-counts:
      - 4
      - 6
      - 8
      - 10
      - 12
      - 15
      - 20
  manga-generation:
    max-concurrent-jobs: 4
  deepseek:
    base-url: https://api.deepseek.com
    model: deepseek-v4-flash
    api-key: ""
  image:
    base-url: https://api.duojie.games/v1
    model: gpt-image-2
    size: 1024x1536
    api-key: ""
  coze:
    base-url: https://api.coze.cn
    api-key: ""
    workflow-id: "7645642109203103763"
  minio:
    endpoint: http://localhost:9000
    bucket: artverse-manga
    region: us-east-1
    access-key: "minioadmin"
    secret-key: "minioadmin"
    secure: false
    public-base-url: ""
    presigned-url-expire-seconds: 3600
  rate-limit:
    # 限流默认值（可被 @RateLimit 注解覆盖）
    enabled: true
    default-window-seconds: 60
    default-max-requests: 30
  single-flight:
    # 幂等（单飞模式）默认值
    enabled: true
    default-ttl-seconds: 30

# Sa-Token 配置（替代 Spring Security + JWT）
sa-token:
  # === Token 基础配置 ===
  token-name: satoken
  timeout: 43200           # Token 硬过期（秒），12h
  active-timeout: 1800       # 活跃续期阈值（秒），30min 内有请求则自动续期
  is-concurrent: true      # 允许多端登录
  is-share: false          # 多端不共享 token
  token-style: uuid        # uuid / 32str / random
  token-prefix: ""         # 不加 Bearer 前缀
  is-read-cookie: true
  is-read-header: true
  is-write-cookie: true
  is-write-header: false
  is-log: true
  cookie:
    http-only: true
    same-site: lax
    secure: false

  # === 拦截器配置 ===
  intercept-urls:
    - /api/auth/login = no-auth
    - /api/auth/register = no-auth
    - /api/auth/refresh = no-auth
    - /static/** = no-auth
    - /actuator/health = no-auth
    - /api/** = auth

  # === Sa-Token Redis 集成 ===
  redis:
    is-read: true
    is-write: true
