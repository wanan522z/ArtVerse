server:
  port: 8000

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/manga_novel?ApplicationName=artverse&stringtype=unspecified&options=-c%20client_encoding%3DUTF8&charSet=UTF-8
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    property-naming-strategy: SNAKE_CASE
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 5000

artverse:
  cors-origins:
    - http://localhost:5173
    - http://127.0.0.1:5173
  storage:
    root: ./manga_outputs
  upload:
    max-image-bytes: 10485760
  import:
    max-zip-bytes: 524288000
    max-novel-chars: 50000
  character:
    max-chars: 20000
  ref:
    max-images-per-level: 4
  manga:
    default-image-count: 10
    allowed-image-counts:
      - 4
      - 6
      - 8
      - 10
      - 12
      - 15
      - 20
  manga-generation:
    max-concurrent-jobs: 4
  deepseek:
    base-url: https://api.deepseek.com
    model: deepseek-v4-flash
    api-key: ""
  image:
    base-url: https://api.duojie.games/v1
    model: gpt-image-2
    size: 1024x1536
    api-key: ""
  coze:
    base-url: https://api.coze.cn
    api-key: ""
    workflow-id: "7645642109203103763"
  minio:
    endpoint: http://localhost:9000
    bucket: artverse-manga
    region: us-east-1
    access-key: "minioadmin"
    secret-key: "minioadmin"
    secure: false
    public-base-url: ""
    presigned-url-expire-seconds: 3600
  rate-limit:
    enabled: true
    default-window-seconds: 60
    default-max-requests: 30
  single-flight:
    enabled: true
    default-ttl-seconds: 30

sa-token:
  token-name: satoken
  timeout: 3600
  active-timeout: 1800
  is-concurrent: true
  is-share: false
  token-style: uuid
  token-prefix: ""
  is-read-cookie: true
  is-read-header: true
  is-write-cookie: true
  is-write-header: false
  is-log: true
  cookie:
    http-only: true
    same-site: lax
    secure: false

  intercept-urls:
    - /api/auth/login = no-auth
    - /api/auth/register = no-auth
    - /api/auth/refresh = no-auth
    - /static/** = no-auth
    - /actuator/health = no-auth
    - /api/** = auth

  redis:
    is-read: true
    is-write: true
